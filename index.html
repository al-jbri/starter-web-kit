<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website</title>
    <meta name="description" content="" />
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body
    class="flex flex-col h-dvh md:flex-row bg-stone-950 text-zinc-200 overflow-hidden"
  >
    <main class="flex-1 flex flex-col gap-5 overflow-auto">
      <section id="stats" class="grid grid-cols-1 md:grid-cols-3 gap-2 p-3">
        <div class="bg-stone-900 rounded-3xl p-3">
          <h3 class="text-xl font-bold">Use Hours:</h3>
          <p>5.3h</p>
        </div>
        <div class="bg-stone-900 rounded-3xl p-3">
          <h3 class="text-xl font-bold">Complated Tasks:</h3>
          <p>20</p>
        </div>
        <div class="bg-stone-900 rounded-3xl p-3">
          <h3 class="text-xl font-bold">Total Tasks:</h3>
          <p>75</p>
        </div>
      </section>

      <section id="tasks" class="flex flex-col gap-2 border-t-2 border-stone-800 p-3">
        <div class="flex items-center gap-2 bg-stone-900  p-3 rounded-3xl">
          <input type="checkbox"></input>
          <span>Task1</span>
        </div>
        <div class="flex items-center gap-2 bg-stone-900  p-3 rounded-3xl">
          <input type="checkbox"></input>
          <span>Task2</span>
        </div>
        <div class="flex items-center gap-2 bg-stone-900  p-3 rounded-3xl">
          <input type="checkbox"></input>
          <span>Task3</span>
        </div>
      </section>
    </main>

    <nav
      class="h-auto p-3 rounded-t-3xl mt-1 flex justify-between items-center bg-stone-900 md:w-auto md:flex-col md:justify-start md:gap-5 md:rounded-3xl md:order-first md:m-1"
    >
      <span class="hidden md:block text-2xl font-bold">&#9632;</span>
      <a href="#stats" class="hover:text-blue-500 transition-all">Stats</a>
      <a href="#tasks" class="hover:text-blue-500 transition-all">Tasks</a>
      <a href="##" class="hover:text-blue-500 transition-all">Settings</a>
    </nav>
  </body>
</html>
